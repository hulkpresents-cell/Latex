
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla LaTeX to PDF Inverter | প্রো ল্যাটেক্স এডিটর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .font-bengali-serif { font-family: 'Noto Serif Bengali', serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            position: relative;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col text-slate-800">

    <header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-md px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-teal-500 p-2 rounded-lg text-slate-900">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide">Bangla LaTeX to PDF Inverter</h1>
                <p class="text-xs text-slate-400 font-light">রিয়েল-টাইম ক্র্যাশ-প্রুফ ল্যাটেক্স রেন্ডারার</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="downloadTeXFile()" class="bg-slate-700 hover:bg-slate-600 transition px-4 py-2 rounded-lg text-sm flex items-center gap-1.5 font-medium border border-slate-600">
                .tex ডাউনলোড
            </button>
            <button onclick="exportToPDF()" class="bg-teal-500 hover:bg-teal-400 transition text-slate-950 px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md">
                পিডিএফ জেনারেট করুন
            </button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden">
        
        <section class="lg:col-span-5 flex flex-col border-r border-slate-200 bg-slate-900 overflow-y-auto">
            <div class="bg-slate-950 text-slate-400 px-4 py-2.5 flex justify-between items-center text-xs border-b border-slate-800">
                <span class="font-code text-teal-400 font-medium">> LATEX SOURCE CODE</span>
                <button onclick="clearEditor()" class="text-rose-400 hover:text-rose-300 transition">ক্লিয়ার করুন</button>
            </div>
            
            <div class="flex-1 flex overflow-hidden min-h-[400px]">
                <div id="line-numbers" class="w-12 bg-slate-950 text-slate-600 font-code text-right pr-2 pt-4 select-none border-r border-slate-800 text-sm leading-6">1</div>
                <textarea id="latex-editor" oninput="handleEditorInput()" class="flex-1 bg-slate-900 text-slate-200 font-code p-4 resize-none outline-none overflow-y-auto leading-6 text-sm" spellcheck="false" placeholder="আপনার ল্যাটেক্স কোড এখানে পেস্ট করুন..."></textarea>
            </div>

            <div class="bg-slate-950 p-4 border-t border-slate-800">
                <div class="flex gap-2">
                    <input id="ai-prompt-input" type="text" placeholder="কোডে কোনো পরিবর্তন করতে চান? এখানে বাংলায় বলুন..." class="flex-1 px-4 py-2 text-sm rounded-lg bg-slate-800 border border-slate-700 text-slate-200 focus:outline-none focus:border-teal-500">
                    <button onclick="askAiAssistant()" class="bg-teal-600 hover:bg-teal-500 text-white font-medium text-sm px-4 py-2 rounded-lg transition">AI রান</button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 flex flex-col bg-slate-200 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-4 max-w-[210mm] mx-auto w-full">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-teal-500 animate-pulse"></span> 
                    লাইভ পিডিএফ প্রিভিউ (A4 SHEET)
                </span>
                <div class="flex gap-1.5">
                    <button onclick="zoomPreview(0.9)" class="bg-white hover:bg-slate-50 text-slate-600 p-1.5 rounded shadow-sm text-xs font-bold">Zoom -</button>
                    <button onclick="zoomPreview(1.0)" class="bg-white hover:bg-slate-50 text-slate-600 px-2.5 py-1 rounded shadow-sm text-xs font-bold">Reset</button>
                    <button onclick="zoomPreview(1.1)" class="bg-white hover:bg-slate-50 text-slate-600 p-1.5 rounded shadow-sm text-xs font-bold">Zoom +</button>
                </div>
            </div>

            <div id="preview-scale-wrapper" class="origin-top transition-transform duration-200">
                <div id="a4-page-preview" class="a4-page font-bengali-serif prose max-w-none text-slate-900 leading-relaxed text-base break-words">
                    </div>
            </div>
        </section>
    </main>

    <div id="toast-notification" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl transition-transform duration-300 translate-y-24 z-50 text-sm font-medium"></div>

    <script>
        const apiKey = ""; // অপশনাল জেমিনি কী এখানে বসাতে পারেন

        window.onload = function() {
            // ইনিশিয়াল ডেমো কোড লোড
            document.getElementById('latex-editor').value = `\\documentclass{article}
\\usepackage{fontspec}
\\usepackage[bangla]{babel}

\\title{স্বাগতম ল্যাটেক্স ইনভার্টারে}
\\author{ইউজার}

\\begin{document}
\\maketitle

\\section{মূল ফিচার}
এখানে আপনি যেকোনো জটিল ল্যাটেক্স কোড পেস্ট করতে পারেন। কোনো কাস্টম কোড থাকলে অ্যাপটি ক্র্যাশ করবে না।

গাণিতিক সমীকরণ রেন্ডারিং ট্রাই করুন:
\\[ f(x) = \\int_{-\\infty}^{\\infty} e^{-x^2} dx \\]

\\begin{goldNote}
এটি একটি অজানা কাস্টম পরিবেশের উদাহরণ। v2.0 পার্সার এটিকে ক্র্যাশ না করিয়ে চমৎকার বক্সে সাজিয়ে দেবে!
\\end{goldNote}

\\end{document}`;
            handleEditorInput();
        }

        function handleEditorInput() {
            syncLineNumbers();
            const sourceCode = document.getElementById('latex-editor').value;
            const previewContainer = document.getElementById('a4-page-preview');
            
            // ক্র্যাশ প্রুফ শিল্ড (Try-Catch)
            try {
                previewContainer.innerHTML = parseLaTeXToHTML(sourceCode);
            } catch (error) {
                previewContainer.innerHTML = `
                    <div class="bg-rose-50 border-2 border-rose-200 text-rose-800 p-5 rounded-xl font-mono text-sm shadow-sm">
                        <div class="flex items-center gap-2 text-rose-600 font-bold mb-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            ল্যাটেক্স পার্সিং ত্রুটি (Parsing Alert)
                        </div>
                        <p class="mb-3 font-semibold">${error.message}</p>
                        <p class="text-xs text-slate-500">পরামর্শ: কোডে কোনো বিশেষ ক্যারেক্টার বা ব্র্যাকেট অসমাপ্ত অবস্থায় আছে কিনা চেক করুন।</p>
                    </div>`;
            }
        }

        function parseLaTeXToHTML(latex) {
            let html = latex;

            // ১. কমেন্ট ক্লিনআপ
            html = html.replace(/(?<!\\)%.*$/gm, '');

            // ২. সেফ ম্যাথ টোকেনাইজেশন (লাইন ব্রেক রেস্ট্রিকশন সহ যাতে পুরো পেজ গিলে না ফেলে)
            let mathTokens = [];
            
            html = html.replace(/\$\$([\s\S]*?)\$\$/g, (match, code) => {
                const token = `__BLOCK_MATH_${mathTokens.length}__`;
                mathTokens.push({ type: 'block', code: code });
                return token;
            });

            html = html.replace(/\\\[([\s\S]*?)\\\]/g, (match, code) => {
                const token = `__BLOCK_MATH_${mathTokens.length}__`;
                mathTokens.push({ type: 'block', code: code });
                return token;
            });

            // ইনলাইন ম্যাথ: শুধুমাত্র একই লাইনের ভেতর সীমাবদ্ধ ($...$)
            html = html.replace(/\$([^$\n]+?)\$/g, (match, code) => {
                if (code.trim() === '') return match;
                const token = `__INLINE_MATH_${mathTokens.length}__`;
                mathTokens.push({ type: 'inline', code: code });
                return token;
            });

            // ৩. মেটাডেটা প্রসেসিং
            let title = "", author = "", date = "";
            const titleMatch = html.match(/\\title\{([\s\S]*?)\}/); if (titleMatch) title = titleMatch[1];
            const authorMatch = html.match(/\\author\{([\s\S]*?)\}/); if (authorMatch) author = authorMatch[1];
            const dateMatch = html.match(/\\date\{([\s\S]*?)\}/); if (dateMatch) date = dateMatch[1];

            // ৪. বডি এক্সট্রাকশন (না থাকলে পুরো ফাইলই বডি)
            const beginDocIdx = html.indexOf('\\begin{document}');
            if (beginDocIdx !== -1) {
                html = html.substring(beginDocIdx + '\\begin{document}'.length);
            }
            const endDocIdx = html.indexOf('\\end{document}');
            if (endDocIdx !== -1) {
                html = html.substring(0, endDocIdx);
            }

            // ৫. টাইটেল মেকিং
            html = html.replace(/\\maketitle/g, `
                <div class="text-center my-6 border-b border-slate-200 pb-5">
                    <h1 class="text-3xl font-bold text-slate-800 font-bengali-serif">${title}</h1>
                    ${author ? `<p class="text-md text-slate-600 font-medium mt-1">${author}</p>` : ''}
                    ${date ? `<p class="text-xs text-slate-400 mt-0.5">${date}</p>` : ''}
                </div>`);

            // ৬. স্ট্যান্ডার্ড স্ট্রাকচার
            html = html.replace(/\\section\*?\{([\s\S]*?)\}/g, '<h1 class="text-2xl font-bold border-b border-slate-300 pb-1 mt-6 mb-3 text-slate-800 font-bengali-serif">$1</h1>');
            html = html.replace(/\\subsection\*?\{([\s\S]*?)\}/g, '<h2 class="text-xl font-bold mt-4 mb-2 text-slate-700 font-bengali-serif">$1</h2>');
            
            // স্টাইলস
            html = html.replace(/\\textbf\{([\s\S]*?)\}/g, '<strong class="font-bold text-slate-900">$1</strong>');
            html = html.replace(/\\textit\{([\s\S]*?)\}/g, '<em class="italic">$1</em>');
            html = html.replace(/\\underline\{([\s\S]*?)\}/g, '<span class="underline">$1</span>');

            // লিস্ট ও এলাইনমেন্ট
            html = html.replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g, '<div class="text-center my-3">$1</div>');
            
            html = html.replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g, (match, content) => {
                const items = content.split(/\\item/).slice(1);
                return `<ul class="my-3 space-y-1">${items.map(i => `<li class="relative pl-5 before:content-['•'] before:absolute before:left-0 before:text-teal-600">${i.trim()}</li>`).join('')}</ul>`;
            });

            html = html.replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g, (match, content) => {
                const items = content.split(/\\item/).slice(1);
                return `<ol class="my-3 space-y-1">${items.map((i, idx) => `<li class="relative pl-6 before:content-['${idx+1}.'] before:absolute before:left-0 before:text-teal-600 font-medium">${i.trim()}</li>`).join('')}</ol>`;
            });

            // ৭. কাস্টম/অজানা এনভায়রনমেন্ট ক্লিনআপ (যেমন goldNote যা আপনার অ্যাপকে সাদা করে দিয়েছিল)
            // এটি যেকোনো অজানা পরিবেশকে ক্র্যাশ না করিয়ে সুন্দর অ্যালার্ট বক্সে রূপান্তর করবে
            html = html.replace(/\\begin\{([a-zA-Z]+)\}([\s\S]*?)\\end\{\1\}/g, `
                <div class="my-4 p-4 bg-amber-50/60 border-l-4 border-amber-500 rounded-r-lg text-slate-700">
                    <span class="text-xs uppercase tracking-wider font-bold text-amber-700 block mb-1">Environment: $1</span>
                    $2
                </div>`);

            // কোনো জোড়া ছাড়া একা পড়ে থাকা কমান্ড মুছে ফেলা
            html = html.replace(/\\[a-zA-Z]+\*?(\{.*?\})?/g, ''); 
            html = html.replace(/\\\\/g, '<br>');

            // প্যারাগ্রাফ বিল্ড
            html = html.split(/\n\n+/).map(p => p.trim() ? `<p class="mb-4 text-slate-800 leading-relaxed">${p}</p>` : '').join('');

            // ৮. ম্যাথ ইনজেক্ট ব্যাক
            mathTokens.forEach((token, index) => {
                const searchToken = `__${token.type.toUpperCase()}_MATH_${index}__`;
                let renderedMath = '';
                try {
                    renderedMath = katex.renderToString(token.code, { displayMode: token.type === 'block', throwOnError: false });
                } catch (e) {
                    renderedMath = `<span class="text-rose-500 font-mono text-xs">[Math Error]</span>`;
                }
                html = html.replace(new RegExp(searchToken, 'g'), renderedMath);
            });

            return html;
        }

        // অন্যান্য ইউটিলিটি ফাংশনসমূহ আগের মতোই ফাস্ট এবং রেসপন্সিভ থাকবে
        let currentScale = 1.0;
        function zoomPreview(scale) {
            currentScale = scale;
            document.getElementById('preview-scale-wrapper').style.transform = `scale(${scale})`;
        }

        function syncLineNumbers() {
            const editor = document.getElementById('latex-editor');
            const lines = editor.value.split('\n').length;
            let html = '';
            for (let i = 1; i <= lines; i++) html += `<div>${i}</div>`;
            document.getElementById('line-numbers').innerHTML = html;
            document.getElementById('line-numbers').scrollTop = editor.scrollTop;
        }

        document.getElementById('latex-editor').addEventListener('scroll', function() {
            document.getElementById('line-numbers').scrollTop = this.scrollTop;
        });

        function clearEditor() {
            document.getElementById('latex-editor').value = '';
            handleEditorInput();
        }

        function exportToPDF() {
            showToast('পিডিএফ তৈরি হচ্ছে...');
            const element = document.getElementById('a4-page-preview');
            html2pdf().set({
                margin: [15, 15, 15, 15],
                filename: 'latex-inverted-document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save().then(() => showToast('পিডিএফ ডাউনলোড সম্পন্ন!'));
        }

        function downloadTeXFile() {
            const content = document.getElementById('latex-editor').value;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'document.tex';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            showToast('.tex ফাইল ডাউনলোড সম্পন্ন!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast-notification');
            t.textContent = msg;
            t.classList.remove('translate-y-24');
            setTimeout(() => t.classList.add('translate-y-24'), 3000);
        }

        async function askAiAssistant() {
            const prompt = document.getElementById('ai-prompt-input').value.trim();
            const currentCode = document.getElementById('latex-editor').value;
            if(!prompt || !apiKey) { showToast('API Key বা প্রম্পট অনুপস্থিত!'); return; }
            showToast('AI কোড প্রসেস করছে...');
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Modify this LaTeX code based on request: "${prompt}". Code:\n${currentCode}` }] }],
                        systemInstruction: { parts: [{ text: "Return ONLY compile-ready valid LaTeX code within markdown blocks." }] }
                    })
                });
                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
                const codeMatch = reply.match(/
